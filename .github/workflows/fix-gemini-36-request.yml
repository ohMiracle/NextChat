name: Fix Gemini 3.6 request parameters

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-gemini-36-request.yml

permissions:
  contents: write

jobs:
  update-request:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Remove deprecated sampling parameters for Gemini 3.6
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/client/platforms/google.ts")
          content = path.read_text(encoding="utf-8")
          old = '''      generationConfig: {
        // stopSequences: [
        //   "Title"
        // ],
        temperature: modelConfig.temperature,
        maxOutputTokens: modelConfig.max_tokens,
        topP: modelConfig.top_p,
        // "topK": modelConfig.top_k,
      },'''
          new = '''      generationConfig: {
        // Gemini 3.6 deprecates temperature/topP/topK. Keep these controls
        // for older Gemini models while omitting them from 3.6 requests.
        maxOutputTokens: modelConfig.max_tokens,
        ...(modelConfig.model === "gemini-3.6-flash"
          ? {}
          : {
              temperature: modelConfig.temperature,
              topP: modelConfig.top_p,
            }),
      },'''

          count = content.count(old)
          if count != 1:
              raise SystemExit(
                  f"Expected exactly one generationConfig block, found {count}."
              )

          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Commit compatibility fix and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/fix-gemini-36-request.yml
          git add app/client/platforms/google.ts .github/workflows/fix-gemini-36-request.yml
          git commit -m "fix: omit deprecated sampling params for Gemini 3.6"
          git push
